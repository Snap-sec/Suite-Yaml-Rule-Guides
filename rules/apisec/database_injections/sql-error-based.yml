rule_name: Error-based SQL Injection
description: "Detects error-based SQL injection vulnerabilities via database error messages across MySQL, PostgreSQL, MSSQL, Oracle, and SQLite."

transform:
  query:
    transformations:
      - replace_all_values_one_by_one:
          - "'"
          - "\""
          - "')--"
          - "\")--"
          - "';--"
          - "\";--"
          - "'));"
          - "' AND 1=CAST('abc' AS int)--"
  body:
    transformations:
      - replace_all_values_one_by_one:
          - "'"
          - "\""
          - "')--"
          - "\")--"
          - "';--"
          - "\";--"
          - "'));"
          - "' AND 1=CAST('abc' AS int)--"
  header:
    transformations:
      - replace_all_values_one_by_one:
          - "'"
          - "\""
          - "')--"
          - "\")--"
          - "';--"
          - "\";--"
          - "'));"
          - "' AND 1=CAST('abc' AS int)--"

match_on:
  body:
    contains:

      - "You have an error in your SQL syntax; check the manual"
      - "supplied argument is not a valid MySQL result"
      - value: 'mysql_fetch_array\(\) expects parameter 1 to be resource'
        options:
          regex: true
      - value: 'mysql_num_rows\(\) expects parameter 1 to be resource'
        options:
          regex: true
      - value: 'mysql_fetch_assoc\(\) expects parameter 1 to be resource'
        options:
          regex: true
      - "Duplicate entry '"
      - "XPATH syntax error: '~"
      - "Got error 'repeated'"
      - value: 'Double value out of range in ''exp\(~'
        options:
          regex: true

      - "ERROR:  invalid input syntax for type integer:"
      - "ERROR:  unterminated quoted string at or near"
      - "ERROR:  syntax error at or near \\\""
      - "ERROR:  operator does not exist: integer ="
      - "ERROR:  current transaction is aborted, commands ignored until end of transaction block"
      - "invalid byte sequence for encoding"
      - "column reference"

      - "Unclosed quotation mark after the character string"
      - "Conversion failed when converting the"
      - "Error converting data type"
      - "Microsoft OLE DB Provider for SQL Server"
      - "Microsoft SQL Server Native Client"
      - "SQLServer JDBC Driver"
      - value: '\[Microsoft\]\[ODBC SQL Server Driver\]'
        options:
          regex: true
      - value: '\[SQL Server\]'
        options:
          regex: true
      - "Incorrect syntax near '"
      - value: 'Statement\(s\) could not be prepared'
        options:
          regex: true

      # ── Oracle ──────────────────────────────────────────────────────────────
      - "ORA-00904:"
      - "ORA-00907:"
      - "ORA-00933:"
      - "ORA-00936:"
      - "ORA-01031:"
      - "ORA-01722:"
      - "ORA-01756:"
      - "ORA-01789:"
      - "ORA-06512:"
      - "ORA-20001:"
      - "ORA-29257:"
      - value: 'oracle\.jdbc\.driver\.OracleDriver'
        options:
          regex: true
      - value: 'oracle\.jdbc\.OracleConnection'
        options:
          regex: true

      # ── SQLite ───────────────────────────────────────────────────────────────
      - "SQLITE_ERROR SQL error or missing database"
      - "[SQLITE_ERROR]"
      - "SQLITE_CONSTRAINT"
      - "SQLite3::Exception:"
      - "SQLiteException"
      - "SqliteError"
      - "SqliteException"
      - value: 'SQLite3::query\(\): Unable to execute a query'
        options:
          regex: true
      - value: 'sqlite3\.OperationalError:'
        options:
          regex: true
      - 'unrecognized token: "'
      - value: 'near "\.":\ syntax error'
        options:
          regex: true
      - "no such table:"
      - "no such column:"
      - "has no column named"

      - "org.h2.jdbc.JdbcSQLSyntaxErrorException"
      - "Syntax error in SQL statement"
      - "org.h2.message.DbException"

      # ── HSQLDB ───────────────────────────────────────────────────────────────
      - "user lacks privilege or object not found"
      - "org.hsqldb.jdbc.JDBCDriver"

      - "DB2 SQL Error"
      - "SQLCODE="

      - "ISAM error:"

      - "SybSQLException"
      - "Sybase message"

      - "Microsoft JET Database Engine"
      - "Microsoft Access Database Engine"

      - "net.snowflake.client.jdbc.SnowflakeSQLException"

      - "ClickHouse exception"
      - value: 'Code: \d+\. DB::Exception'
        options:
          regex: true

      - value: 'SQLSTATE\[42000\]'
        options:
          regex: true
      - value: 'SQLSTATE\[HY000\]'
        options:
          regex: true
      - value: 'SQLSTATE\[22007\]'
        options:
          regex: true
      - value: 'SQLSTATE\[22P02\]'
        options:
          regex: true
      - value: 'java\.sql\.SQLException:'
        options:
          regex: true
      - value: 'org\.hibernate\.exception\.SQLGrammarException'
        options:
          regex: true
      - value: 'org\.hibernate\.exception\.DataException'
        options:
          regex: true
      - "PDOException: SQLSTATE"
      - value: 'System\.Data\.SqlClient\.SqlException'
        options:
          regex: true
      - value: 'Microsoft\.Data\.SqlClient\.SqlException'
        options:
          regex: true
      - value: 'Npgsql\.NpgsqlException'
        options:
          regex: true
      - value: 'Npgsql\.PostgresException'
        options:
          regex: true
      - value: 'PSQLException'
        options:
          regex: true
      - "ActiveRecord::StatementInvalid"
      - "PG::SyntaxError:"
      - "PG::UndefinedTable:"
      - "PG::UndefinedColumn:"
      - value: 'Caused by: java\.sql\.SQLSyntaxErrorException'
        options:
          regex: true
      - value: 'pq: syntax error at or near'
        options:
          regex: true
      - value: 'cockroachdb.*syntax error'
        options:
          regex: true
      - value: 'com\.datastax\.driver'
        options:
          regex: true
      - "com.datastax.oss.driver.api.core.servererrors.SyntaxError"
      - value: 'mysqli_sql_exception'
        options:
          regex: true
      - "DatabaseError"
      - value: 'QueryException'
        options:
          regex: true

report:
  title: "Error-based SQL Injection indicators found"
  description: >-
    Injecting SQL metacharacters and error-extracting payloads into individual
    parameters caused the server to return high-fidelity database error
    signatures. Patterns matched are verbatim engine error strings, JDBC/ORM
    exception class names, and SQLSTATE codes — not generic phrases that appear
    in normal page content.
    Original: {{original.method}} {{original.url}}
    Tested:   {{req.method}} {{req.url}}
    Matched:  {{match.criteria}}
    Status:   {{res.status}} | Content-Type: {{res.headers.Content-Type}}
  severity: critical
  cwe: "CWE-89"
  cvssScore: "9.0"
  mitigation: >-
    Use parameterized queries (prepared statements), apply strict server-side
    validation and encoding, disable verbose DB errors in production, and use
    least-privilege DB accounts.
  stepsToReproduce: |
    1) Send the baseline request: {{original.method}} {{original.url}}
    2) Re-send while replacing a single parameter value with a syntax-breaking or error-extracting payload.
    3) Observe response containing a verbatim database error (e.g., "You have an error in your SQL syntax", "ORA-00907", "Conversion failed when converting", "SQLSTATE[42000]").
    4) Repeat for other parameters to confirm the scope.
  tags: "sqli,error-based,owasp-a03,mysql,postgres,mssql,oracle,sqlite"
  impact: >-
    Attackers can enumerate schema/data and potentially take over the database by
    exploiting query construction flaws revealed via verbose errors.
