rule_name: Command Injection - single command (uname -a)
description: "Detects OS command injection vulnerabilities by attempting to execute system commands."

transform:
  query:
    transformations:
      - replace_all_values_one_by_one:
          - "; uname -a"
          - "&& uname -a"
          - "| uname -a"
          - "`uname -a`"
          - "$(uname -a)"
          - "|| uname -a"
          - "; /bin/uname -a"
          - "&& /bin/uname -a"

  body:
    transformations:
      - replace_all_values_one_by_one:
          - "; uname -a"
          - "&& uname -a"
          - "| uname -a"
          - "`uname -a`"
          - "$(uname -a)"
          - "|| uname -a"
          - "; /bin/uname -a"

  header:
    transformations:
      - replace_all_values_one_by_one:
          - "; uname -a"
          - "&& uname -a"
          - "`uname -a`"
          - "$(uname -a)"

match_on:
  body:
    contains:
      - " SMP "
      - "x86_64 GNU/Linux"
      - "aarch64 GNU/Linux"
      - "#1 SMP"
      - "x86_64 x86_64 x86_64"
      - "-generic #"
      - "-amd64 #"
      - "Linux version "

      - "armv7l GNU/Linux"
      - "armv6l GNU/Linux"
      - "armv5tel GNU/Linux"
      - "i686 GNU/Linux"
      - "i386 GNU/Linux"
      - "riscv64 GNU/Linux"
      - "ppc64le GNU/Linux"
      - "ppc64 GNU/Linux"
      - "s390x GNU/Linux"
      - "mips GNU/Linux"
      - "mips64 GNU/Linux"

      - "Darwin Kernel Version"
      - "RELEASE_X86_64 x86_64"
      - "RELEASE_ARM64_T"

      - "-RELEASE FreeBSD"
      - "FreeBSD 1"
      - "FreeBSD 9"
      - "FreeBSD 8"
      - "OpenBSD "
      - "NetBSD "

      - value: 'SunOS 5\.'
        options:
          regex: true

      - "AIX "

      - "HP-UX "

      - "Microsoft Windows [Version"
      - "OS Name:                   Microsoft Windows"
      - "CYGWIN_NT-"
      - "MINGW64_NT-"
      - "MINGW32_NT-"
      - "MSYS_NT-"

report:
  title: "Possible Command Injection — `uname -a` output detected"
  description: >-
    Injecting `uname -a` (via various shell wrappers) into request parameters
    produced responses containing structured kernel output markers — such as
    " SMP ", "x86_64 GNU/Linux", "Darwin Kernel Version", "CYGWIN_NT-", or
    "Microsoft Windows [Version" — that are only present when the injected
    command was actually executed by the server. These patterns are derived from
    the real output format of `uname -a` across Linux (x86_64, ARM, i686,
    RISC-V, POWER, Z, MIPS), macOS, FreeBSD, OpenBSD, NetBSD, Solaris, AIX,
    HP-UX, and Windows (Cygwin/MinGW/MSYS2), not from generic OS name strings
    that commonly appear in normal page content.
    Original: {{original.method}} {{original.url}}
    Tested:   {{req.method}} {{req.url}}
    Matched:  {{match.criteria}}
    Status:   {{res.status}} | Content-Type: {{res.headers.Content-Type}}
  severity: critical
  cwe: "CWE-78"
  cvssScore: "9.8"
  mitigation: >-
    Avoid invoking shells with user-controlled input. Use native OS APIs or safe
    libraries, validate and whitelist inputs, escape values properly if needed,
    run processes with least privilege, and disable verbose error output in
    production.
  stepsToReproduce: |
    1) Send the baseline request: {{original.method}} {{original.url}}
    2) Re-send while replacing a single parameter value with one of the transformations above (e.g. "; uname -a" or "`uname -a`").
    3) Observe response body for structured kernel output markers (e.g., "x86_64 GNU/Linux", "Darwin Kernel Version", "Microsoft Windows [Version").
    4) Confirm across multiple parameters to determine scope.
  tags: "command-injection,os-command,critical"
  impact: >-
    Remote command execution can lead to full system compromise, data theft,
    lateral movement, and persistence. Treat confirmed findings as critical.
