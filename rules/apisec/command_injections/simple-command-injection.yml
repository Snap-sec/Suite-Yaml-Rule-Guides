rule_name: Command Injection - single command (uname -a)
description: "Detects OS command injection vulnerabilities by attempting to execute system commands."

transform:
  query:
    transformations:
      - replace_all_values_one_by_one:
          - "; uname -a"
          - "&& uname -a"
          - "| uname -a"
          - "`uname -a`"
          - "$(uname -a)"
          - "|| uname -a"
          - "; /bin/uname -a"
          - "&& /bin/uname -a"

  body:
    transformations:
      - replace_all_values_one_by_one:
          - "; uname -a"
          - "&& uname -a"
          - "| uname -a"
          - "`uname -a`"
          - "$(uname -a)"
          - "|| uname -a"
          - "; /bin/uname -a"

  header:
    transformations:
      - replace_all_values_one_by_one:
          - "; uname -a"
          - "&& uname -a"
          - "`uname -a`"
          - "$(uname -a)"

match_on:
  body:
    contains:
      # ── Linux: structured uname -a output ──────────────────────────────────
      # Real uname -a output looks like:
      #   Linux hostname 5.15.0-76-generic #83-Ubuntu SMP ... x86_64 x86_64 x86_64 GNU/Linux
      # These substrings only appear together in actual kernel output, not in
      # ordinary HTML/JSON responses.
      - " SMP "                        # Symmetric Multi-Processing flag, unique to kernel banner
      - "x86_64 GNU/Linux"             # Arch + OS tag at end of Linux uname output
      - "aarch64 GNU/Linux"            # ARM64 (64-bit ARM) variant
      - "#1 SMP"                       # Debian/Ubuntu kernel build number prefix
      - "x86_64 x86_64 x86_64"        # Triple-arch field produced only by uname -a
      - "-generic #"                   # Ubuntu/Debian kernel release + build tag
      - "-amd64 #"                     # Debian amd64 kernel tag
      - "Linux version "               # /proc/version prefix — only present on real Linux output

      # ── Linux: additional architectures (gap patch) ─────────────────────────
      - "armv7l GNU/Linux"             # ARM 32-bit hard-float (Raspberry Pi 3/4, IoT)
      - "armv6l GNU/Linux"             # ARM 32-bit soft-float (Raspberry Pi 1/Zero)
      - "armv5tel GNU/Linux"           # Older ARMv5 embedded devices
      - "i686 GNU/Linux"               # 32-bit x86 Linux (i686)
      - "i386 GNU/Linux"               # 32-bit x86 Linux (i386)
      - "riscv64 GNU/Linux"            # RISC-V 64-bit Linux
      - "ppc64le GNU/Linux"            # IBM POWER little-endian Linux
      - "ppc64 GNU/Linux"              # IBM POWER big-endian Linux
      - "s390x GNU/Linux"              # IBM Z (mainframe) Linux
      - "mips GNU/Linux"               # MIPS Linux (routers, embedded)
      - "mips64 GNU/Linux"             # MIPS64 Linux

      # ── macOS / Darwin: structured uname -a output ─────────────────────────
      # Darwin uname -a example:
      #   Darwin Macbook.local 23.4.0 Darwin Kernel Version 23.4.0: ... RELEASE_X86_64 x86_64
      - "Darwin Kernel Version"        # Only in real macOS kernel banner
      - "RELEASE_X86_64 x86_64"        # macOS Intel kernel arch suffix
      - "RELEASE_ARM64_T"              # Apple Silicon kernel release tag (T8103, T6000, etc.)

      # ── FreeBSD / OpenBSD / NetBSD ─────────────────────────────────────────
      # FreeBSD uname -a:
      #   FreeBSD host 14.0-RELEASE FreeBSD 14.0-RELEASE ... amd64
      - "-RELEASE FreeBSD"             # FreeBSD release banner pattern (all versions)
      - "FreeBSD 1"                    # FreeBSD 10–19
      - "FreeBSD 9"                    # FreeBSD 9.x (gap patch — EOL but still deployed)
      - "FreeBSD 8"                    # FreeBSD 8.x legacy (gap patch)
      - "OpenBSD "                     # OpenBSD uname prefix (trailing space avoids partial match)
      - "NetBSD "                      # NetBSD uname prefix

      # ── SunOS / Solaris ────────────────────────────────────────────────────
      - "SunOS 5\."                    # Solaris 10/11 uname version (e.g. "SunOS 5.11")

      # ── AIX (gap patch) ────────────────────────────────────────────────────
      # AIX uname -a example:
      #   AIX hostname 1 7 00F84C0C4C00
      # Format: AIX <host> <version> <release> <machine-id>
      - "AIX "                         # AIX uname prefix (trailing space avoids partial word match)

      # ── HP-UX (gap patch) ──────────────────────────────────────────────────
      # HP-UX uname -a example:
      #   HP-UX hostname B.11.31 U ia64 ...
      - "HP-UX "                       # HP-UX uname prefix

      # ── Windows: cmd/PowerShell output ─────────────────────────────────────
      # These appear only in real shell output, not in normal web responses.
      - "Microsoft Windows \[Version"  # Exact cmd.exe banner
      - "OS Name:                   Microsoft Windows"  # systeminfo output pattern
      - "CYGWIN_NT-"                   # Cygwin uname -a prefix, highly specific
      - "MINGW64_NT-"                  # Git-for-Windows / MinGW 64-bit uname prefix
      - "MINGW32_NT-"                  # MinGW 32-bit uname prefix (gap patch)
      - "MSYS_NT-"                     # MSYS2 uname prefix

report:
  title: "Possible Command Injection — `uname -a` output detected"
  description: >-
    Injecting `uname -a` (via various shell wrappers) into request parameters
    produced responses containing structured kernel output markers — such as
    " SMP ", "x86_64 GNU/Linux", "Darwin Kernel Version", "CYGWIN_NT-", or
    "Microsoft Windows [Version" — that are only present when the injected
    command was actually executed by the server. These patterns are derived from
    the real output format of `uname -a` across Linux (x86_64, ARM, i686,
    RISC-V, POWER, Z, MIPS), macOS, FreeBSD, OpenBSD, NetBSD, Solaris, AIX,
    HP-UX, and Windows (Cygwin/MinGW/MSYS2), not from generic OS name strings
    that commonly appear in normal page content.
    Original: {{original.method}} {{original.url}}
    Tested:   {{req.method}} {{req.url}}
    Matched:  {{match.criteria}}
    Status:   {{res.status}} | Content-Type: {{res.headers.Content-Type}}
  severity: critical
  cwe: "CWE-78"
  cvssScore: "9.8"
  mitigation: >-
    Avoid invoking shells with user-controlled input. Use native OS APIs or safe
    libraries, validate and whitelist inputs, escape values properly if needed,
    run processes with least privilege, and disable verbose error output in
    production.
  stepsToReproduce: |
    1) Send the baseline request: {{original.method}} {{original.url}}
    2) Re-send while replacing a single parameter value with one of the transformations above (e.g. "; uname -a" or "`uname -a`").
    3) Observe response body for structured kernel output markers (e.g., "x86_64 GNU/Linux", "Darwin Kernel Version", "Microsoft Windows [Version").
    4) Confirm across multiple parameters to determine scope.
  tags: "command-injection,os-command,critical"
  impact: >-
    Remote command execution can lead to full system compromise, data theft,
    lateral movement, and persistence. Treat confirmed findings as critical.
