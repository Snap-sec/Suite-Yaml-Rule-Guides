rule_name: Angular Client-Side Template Injection
description: "Detects Angular Client-Side Template Injection vulnerabilities."

transform:
  query:
    transformations:
      - replace_all_values_one_by_one:
          - "{{13337*7}}"
          - "{{constructor.constructor('alert(1)')()}}"
          - "w{{'a'+'it'}}for{{'i'+'t'}}"
          - "{{'angular'+'csti'}}"
  body:
    transformations:
      - replace_all_values_one_by_one:
          - "{{13337*7}}"
          - "{{constructor.constructor('alert(1)')()}}"
          - "w{{'a'+'it'}}for{{'i'+'t'}}"
          - "{{'angular'+'csti'}}"
  header:
    transformations:
      - replace_all_values_one_by_one:
          - "{{13337*7}}"
          - "{{constructor.constructor('alert(1)')()}}"
          - "w{{'a'+'it'}}for{{'i'+'t'}}"
          - "{{'angular'+'csti'}}"

match_on:
  body:
    contains:
      - "93359"
      - "angularcsti"
      - "waitforit"

report:
  title: "Angular Client-Side Template Injection"
  description: |
    The application is vulnerable to Angular Client-Side Template Injection (CSTI).
    User input is evaluated as an Angular expression, which can lead to XSS.

    Original Request:
    {{original}}

    Transformed Request:
    {{req}}

    Response:
    {{res}}

  cwe: "CWE-79"
  severity: medium
  cvssScore: "6.1"
  mitigation: |
    1. Avoid generating Angular templates from user input.
    2. Use `ng-non-bindable` for untrusted content.
    3. Use Content Security Policy (CSP).
  stepsToReproduce: |
    1. Inject {{13337*7}} or {{'angular'+'csti'}} into a parameter.
    2. Observe "93359" or "angularcsti" in the response.
  tags: "csti,angular,injection,xss,vuln"
  impact: "Cross-Site Scripting (XSS)"
