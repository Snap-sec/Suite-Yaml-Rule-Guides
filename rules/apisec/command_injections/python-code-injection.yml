match_on:
  body:
    contains:
      # ── Linux: /etc/passwd output ───────────────────────────────────────────
      # These substrings are structural fields from /etc/passwd — the colon-
      # delimited format makes them extremely specific to actual file content.
      - "root:x:0:0:"                  # Root user passwd entry (standard shadow)
      - "root:\\*:0:0:"                 # Root user passwd entry (BSD/locked variant)
      - "daemon:x:1:1:"                # Daemon user with UID:GID — more specific than "daemon:x:"
      - "nobody:x:65534:"              # Linux nobody UID is always 65534
      - "nobody:\\*:65534:"             # BSD nobody variant
      - "www-data:x:33:"              # Debian/Ubuntu web server user entry
      - ":/bin/bash"                   # Shell field in passwd — only in actual file dumps
      - ":/bin/sh"                     # Minimal shell field — passwd file artifact
      - ":/sbin/nologin"               # No-login shell field — passwd file artifact
      - ":/usr/sbin/nologin"           # Ubuntu/Debian nologin path variant

      # ── Linux: id(1) command output ─────────────────────────────────────────
      # The `id` command always outputs: uid=N(name) gid=N(name) groups=N(name),...
      # Matching the full uid=N(name) gid=N(name) pattern eliminates the
      # "uid=" false positive (which fires on ?uid=123, JSON uid fields, etc.)
      - "uid=0\\(root\\) gid=0\\(root\\)" # Root id output — most definitive indicator
      - "uid=33\\(www-data\\) gid=33"   # Apache/nginx user on Debian/Ubuntu
      - "uid=48\\(apache\\) gid=48"     # Apache user on RHEL/CentOS
      - "uid=1000\\("                   # Standard first non-root user (uid=1000(username))
      - "\\) gid="                      # The ") gid=" transition only appears in id(1) output

      # ── Linux: uname -a structured output ───────────────────────────────────
      - "x86_64 GNU/Linux"             # Arch + OS suffix — never in normal page content
      - "aarch64 GNU/Linux"            # ARM64 variant
      - " SMP "                        # SMP kernel flag — unique to kernel banner
      - "Linux version "               # /proc/version prefix

      # ── Windows: win.ini file content ───────────────────────────────────────
      # win.ini always starts with these two lines — matching both together via
      # any single match avoids false positives from generic words.
      - "; for 16-bit app support"     # Verbatim win.ini comment — highly specific
      - "\\[fonts\\]"                    # win.ini [fonts] section header
      - "\\[extensions\\]"               # win.ini [extensions] section header

      # ── Windows: hosts file content ─────────────────────────────────────────
      - "# Copyright \\(c\\) 1993-"     # Verbatim MS hosts file copyright comment

      # ── Windows: systeminfo output ──────────────────────────────────────────
      - "OS Name:                   Microsoft Windows"   # systeminfo verbatim line with padding
      - "OS Version:                "  # systeminfo OS Version field with padding — structural
      - "System Type:               "  # systeminfo System Type field with padding

      # ── Windows: ipconfig output ─────────────────────────────────────────────
      - "Windows IP Configuration"     # Exact ipconfig header line
      - "IPv4 Address\\. \\. \\. \\. \\. \\. \\. \\. \." # ipconfig dot-padding format — unique to cmd output

report:
  title: "Python Code Injection"
  description: |
    The application is vulnerable to Python Code Injection.
    It was possible to execute arbitrary system commands by injecting Python code into request parameters.
    This affects both Linux and Windows server environments.

    Original Request:
    {{original}}

    Transformed Request:
    {{req}}

    Response:
    {{res}}

  cwe: "CWE-94"
  severity: critical
  cvssScore: "9.8"
  mitigation: |
    1. Avoid using `eval()`, `exec()`, or similar functions with user-supplied input.
    2. Input validation and sanitization.
    3. Use safer alternatives for parsing data.
    4. Implement sandboxing or restricted execution environments.
    5. Disable or restrict `__import__`, `compile`, and `exec` builtins in user-facing contexts.
  stepsToReproduce: |
    1. Send the transformed request to {{req.url}}
    2. Observe the response containing system-level output such as:
       - Linux: contents of /etc/passwd (e.g., "root:x:0:0:..."), uid/gid from `id`, or kernel info from `uname`
       - Windows: contents of win.ini (e.g., "[fonts]"), hosts file, or output from `systeminfo`/`ipconfig`
  tags: "python,dast,injection,cmdi,rce,vuln,critical"
  impact: "Remote Code Execution (RCE), full system compromise on both Linux and Windows servers."
