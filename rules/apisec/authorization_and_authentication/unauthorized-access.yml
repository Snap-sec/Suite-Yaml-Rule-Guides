rule_name: Auth Not Required - Successful JSON response without credentials
description: "Detects unprotected JSON endpoints accessible without authentication."

transform:
  header:
    remove:
      - Authorization
      - Cookie
      - X-API-Key
      - X-Auth-Token
      - X-Access-Token
      - Api-Key
      - Authentication

match_on:
  status: [200, 201, 204]
  header:
    Content-Type:
      contains: json

report:
  title: "Unprotected JSON endpoint (no auth required)"
  description: >-
    The endpoint returned a successful status (200, 201, or 204) with a JSON response even after removing all
    authentication headers, cookies, and common token parameters.
    Original: {{original.method}} {{original.url}}
    Tested: {{req.method}} {{req.url}}
  cwe: "CWE-287"
  severity: critical
  cvssScore: "6.5"
  mitigation: >-
    Enforce authentication/authorization on this endpoint; require valid tokens
    server-side and reject requests lacking credentials.
  stepsToReproduce: |
    1) Send the original request.
    2) Re-send without Authorization/Cookie and without token params (as above).
    3) Observe a successful status code (200/201/204) and JSON Content-Type. Response: {{res.status}} {{res.statusText}}
  tags: "auth,access-control,misconfiguration"
  impact: >-
    Unauthenticated access to JSON data/functionality may expose sensitive
    information or allow unauthorized actions.