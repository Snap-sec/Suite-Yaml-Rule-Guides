rule_name: Stack Trace Exposure in Response
description: "Detects server-side stack traces and exception details leaked in API responses across Java, Python, Node.js, .NET, PHP, Ruby, and Go."

single_match: true

match_on:
  status:
    notIn: [404, 301, 302]
  body:
    contains:
      - value: 'at org\.springframework\.'
        options:
          regex: true
      - value: 'at java\.lang\.'
        options:
          regex: true
      - value: 'at javax\.servlet\.'
        options:
          regex: true
      - value: 'java\.lang\.NullPointerException'
        options:
          regex: true
      - value: 'java\.lang\.RuntimeException'
        options:
          regex: true
      - value: 'java\.lang\.IllegalArgumentException'
        options:
          regex: true
      - value: 'java\.io\.IOException'
        options:
          regex: true
      - "Caused by:"
      - "Exception in thread"

      - value: 'Traceback (most recent call last):'
        options:
          regex: true
      - "in <module>"
      - value: 'File \"/.*\.py\", line [0-9]+'
        options:
          regex: true
      - value: 'django\.core\.exceptions'
        options:
          regex: true
      - value: 'flask\.exceptions'
        options:
          regex: true
      - "raise ValueError"
      - "AttributeError:"
      - "KeyError:"
      - "ModuleNotFoundError:"

      - value: 'at Object\.<anonymous>'
        options:
          regex: true
      - value: 'at Module\._compile'
        options:
          regex: true
      - value: 'at Function\.Module\._load'
        options:
          regex: true
      - value: 'at process\.EventEmitter\.emit'
        options:
          regex: true
      - "UnhandledPromiseRejectionWarning"
      - "TypeError: Cannot read propert"
      - "ReferenceError:"
      - "node_modules/express"

      - value: 'System\.NullReferenceException'
        options:
          regex: true
      - value: 'System\.ArgumentException'
        options:
          regex: true
      - value: 'System\.InvalidOperationException'
        options:
          regex: true
      - value: 'Microsoft\.AspNetCore'
        options:
          regex: true
      - value: 'at Microsoft\.AspNetCore\.'
        options:
          regex: true
      - value: 'at System\.Web\.HttpApplication'
        options:
          regex: true
      - "Server Error in '/' Application"
      - "Stack Trace:"

      - "PHP Fatal error:"
      - "PHP Parse error:"
      - "PHP Warning:"
      - "PHP Notice:"
      - "Fatal error: Uncaught"
      - "in /var/www/"
      - "Stack trace:"
      - "thrown in /"

      - "ActionController::RoutingError"
      - "ActionView::MissingTemplate"
      - "ActiveRecord::RecordNotFound"
      - "app/controllers/"
      - "app/models/"
      - value: 'goroutine [0-9]+ \[running\]'
        options:
          regex: true
      - value: 'runtime\.goexit'
        options:
          regex: true
      - "panic: runtime error"

report:
  title: "Stack Trace / Exception Details Exposed in Response"
  description: |
    The API response contains a server-side stack trace or exception message.
    Stack traces reveal internal file paths, framework versions, class names,
    and logic flow — significantly lowering the effort required to exploit other vulnerabilities.

    Affected Endpoint:
    {{req.url}}

    Response:
    {{res}}

  cwe: "CWE-209"
  severity: medium
  cvssScore: "5.3"
  mitigation: |
    1. Disable detailed error output in production (set DEBUG=False / NODE_ENV=production).
    2. Return generic error messages to clients (e.g., "An error occurred").
    3. Log full stack traces server-side only — never include them in API responses.
    4. Use a global exception handler / middleware to sanitize error responses.
  stepsToReproduce: |
    1. Send a request to {{req.url}}.
    2. Inspect the response body for framework-specific exception strings or file paths.
  tags: "stack-trace,error-disclosure,information-leakage,medium,owasp-api7"
  impact: "Reveals internal architecture, file paths, library versions — aids targeted attacks."
