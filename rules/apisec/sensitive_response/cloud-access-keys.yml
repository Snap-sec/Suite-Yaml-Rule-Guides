rule_name: Cloud Access Keys Exposure in Response
description: "Detects plaintext cloud provider access keys and secrets (AWS, GCP, Azure) in API responses."

single_match: true

match_on:
  status:
    notIn: [404, 301, 302]
  body:
    contains:
      - value: 'AKIA[0-9A-Z]{16}'
        options:
          regex: true
      - value: 'ASIA[0-9A-Z]{16}'
        options:
          regex: true
      - value: '"secretAccessKey"\s*:\s*"[A-Za-z0-9/+=]{40}"'
        options:
          regex: true
      - value: '"aws_secret_access_key"\s*:\s*"[A-Za-z0-9/+=]{40}"'
        options:
          regex: true
      - value: '"SecretAccessKey"\s*:\s*"[A-Za-z0-9/+=]{40}"'
        options:
          regex: true
      - value: '"SessionToken"\s*:\s*"[A-Za-z0-9/+=]{100,}"'
        options:
          regex: true
      - value: '"aws_session_token"\s*:\s*"[A-Za-z0-9/+=]{100,}"'
        options:
          regex: true

      - value: 'AIza[0-9A-Za-z\-_]{35}'
        options:
          regex: true
      - value: 'GOCSPX-[0-9A-Za-z\-_]{28}'
        options:
          regex: true
      - value: '"type"\s*:\s*"service_account"'
        options:
          regex: true
      - value: '"private_key_id"\s*:\s*"[a-f0-9]{40}"'
        options:
          regex: true
      - value: 'AAAA[A-Za-z0-9_-]{7}:[A-Za-z0-9_-]{140}'
        options:
          regex: true

      - value: 'DefaultEndpointsProtocol=https;AccountName=[^;]+;AccountKey=[A-Za-z0-9+/=]{86,88}'
        options:
          regex: true
      - value: '"clientSecret"\s*:\s*"[A-Za-z0-9~._\-]{34,}"'
        options:
          regex: true
      - value: 'sv=[0-9]{4}-[0-9]{2}-[0-9]{2}&ss=.*&sig=[A-Za-z0-9%]+'
        options:
          regex: true
      - value: '"appKey"\s*:\s*"[A-Za-z0-9+/=]{43,44}"'
        options:
          regex: true

      - value: '"fingerprint"\s*:\s*"[a-f0-9]{2}(:[a-f0-9]{2}){15}"'
        options:
          regex: true

      - value: 'dop_v1_[a-f0-9]{64}'
        options:
          regex: true

      - value: '"X-Auth-Key"\s*:\s*"[a-f0-9]{37}"'
        options:
          regex: true

report:
  title: "Cloud Provider Access Keys Exposed in Response"
  description: |
    The API response contains plaintext cloud provider access keys or secrets
    (AWS, GCP, Azure, or others). An attacker with these credentials can access,
    modify, or destroy cloud infrastructure and all data stored within it.

    Affected Endpoint:
    {{req.url}}

    Response:
    {{res}}

  cwe: "CWE-312"
  severity: critical
  cvssScore: "10.0"
  mitigation: |
    1. Immediately rotate all exposed cloud credentials.
    2. Store cloud credentials in a secrets manager — never in code, responses, or logs.
    3. Use IAM roles and short-lived credentials via STS/Workload Identity instead of static keys.
    4. Enable CloudTrail / audit logging to detect unauthorized use of exposed keys.
    5. Apply least-privilege IAM policies to all service accounts.
  stepsToReproduce: |
    1. Send a request to {{req.url}}.
    2. Inspect the response for cloud key patterns (AKIA..., AIza..., Azure connection strings).
  tags: "aws,gcp,azure,cloud,credentials,secrets,critical,iam"
  impact: "Full cloud infrastructure takeover, data breach, resource abuse, ransomware deployment."
