rule_name: Password and Secret Fields in JSON Response
description: "Detects plaintext password, secret, token, and credential fields returned in JSON API responses."

single_match: true

match_on:
  status:
    notIn: [404, 301, 302]
  body:
    contains:
      - value: '"password"\s*:\s*"[^"]{4,}"'
        options:
          regex: true
      - value: '"passwd"\s*:\s*"[^"]{4,}"'
        options:
          regex: true
      - value: '"pass"\s*:\s*"[^"]{4,}"'
        options:
          regex: true
      - value: '"userPassword"\s*:\s*"[^"]{4,}"'
        options:
          regex: true
      - value: '"user_password"\s*:\s*"[^"]{4,}"'
        options:
          regex: true
      - value: '"current_password"\s*:\s*"[^"]{4,}"'
        options:
          regex: true
      - value: '"old_password"\s*:\s*"[^"]{4,}"'
        options:
          regex: true
      - value: '"new_password"\s*:\s*"[^"]{4,}"'
        options:
          regex: true
      - value: '"pin"\s*:\s*"?[0-9]{4,8}"?'
        options:
          regex: true
      - value: '"mpin"\s*:\s*"?[0-9]{4,6}"?'
        options:
          regex: true
      - value: '"secret"\s*:\s*"[^"]{8,}"'
        options:
          regex: true
      - value: '"secret_key"\s*:\s*"[^"]{8,}"'
        options:
          regex: true
      - value: '"private_key"\s*:\s*"[^"]{8,}"'
        options:
          regex: true
      - value: '"encryption_key"\s*:\s*"[^"]{8,}"'
        options:
          regex: true
      - value: '"signing_key"\s*:\s*"[^"]{8,}"'
        options:
          regex: true
      - value: '"api_key"\s*:\s*"[A-Za-z0-9\-_]{16,}"'
        options:
          regex: true
      - value: '"apiKey"\s*:\s*"[A-Za-z0-9\-_]{16,}"'
        options:
          regex: true
      - value: '"api_secret"\s*:\s*"[A-Za-z0-9\-_]{16,}"'
        options:
          regex: true
      - value: '"app_secret"\s*:\s*"[A-Za-z0-9\-_]{16,}"'
        options:
          regex: true
      - value: '"access_token"\s*:\s*"[A-Za-z0-9\.\-_~+/]{20,}"'
        options:
          regex: true
      - value: '"refresh_token"\s*:\s*"[A-Za-z0-9\.\-_~+/]{20,}"'
        options:
          regex: true
      - value: '"client_secret"\s*:\s*"[A-Za-z0-9\.\-_~+/]{16,}"'
        options:
          regex: true
      - value: '"credentials"\s*:\s*\{'
        options:
          regex: true
      - value: '"auth"\s*:\s*\{.*"password"'
        options:
          regex: true

report:
  title: "Plaintext Password / Secret Field in JSON Response"
  description: |
    The API response contains plaintext password, secret, or API key fields in the
    JSON body. Returning credential data in responses violates security best practices
    and exposes users to account takeover if responses are intercepted or logged.

    Affected Endpoint:
    {{req.url}}

    Response:
    {{res}}

  cwe: "CWE-312"
  severity: critical
  cvssScore: "9.1"
  mitigation: |
    1. Never serialize password or secret fields in API responses.
    2. Use an explicit allowlist/DTO pattern — only return fields that are intentionally safe.
    3. Hash passwords using bcrypt/argon2 and never return even the hash to clients.
    4. Mask tokens in responses (return only partial values or replace with issued token).
  stepsToReproduce: |
    1. Send a request to {{req.url}}.
    2. Inspect the response JSON for password, secret, api_key, or token fields with values.
  tags: "password,credentials,secrets,api-key,token,critical,owasp-api3"
  impact: "Account takeover, credential stuffing, unauthorized API access."
