name: 'Web Server Directly Exposed via Public IP Address'
description: >-
  Detects web servers that are externally reachable and whose asset value resolves directly to a public IP address rather than a domain name. Hosting a web server on a bare IP bypasses DNS-based security controls, CDN protection, and WAF coverage. It also exposes the server to automated scanners targeting raw IP ranges and makes it harder to rotate infrastructure without breaking access.
product: asm
severity: high
isUniversal: true
match:
  conditions:
    - field: type
      operator: '=='
      value: web_server
    - field: network_scope
      operator: '=='
      value: external
    - field: value
      operator: 'regex'
      value: ^(https?:\/\/)(?!10\.)(?!127\.)(?!169\.254\.)(?!172\.(1[6-9]|2\d|3[0-1])\.)(?!192\.168\.)(?:25[0-5]|2[0-4]\d|1\d\d|[1-9]?\d)(?:\.(?:25[0-5]|2[0-4]\d|1\d\d|[1-9]?\d)){3}:\d{1,5}$
