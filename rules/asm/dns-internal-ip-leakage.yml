name: 'DNS Record with Internal IP Leakage'
description: >-
  Detects public DNS A or AAAA records that resolve to private or reserved IP addresses
  (e.g., 10.x.x.x, 172.16-31.x.x, 192.168.x.x, fc00::/7, or link-local ranges).
  This misconfiguration leaks internal network topology to external parties, enabling
  attackers to map the organization's private infrastructure, identify potential pivot
  points, and craft targeted attacks against internal services.
product: asm
severity: high
isUniversal: true
remediation: >-
  Update or remove the public DNS record so it no longer resolves to a private or
  reserved IP address. Use split-horizon DNS to serve internal records only within
  the corporate network. Audit all public zones periodically for accidental internal
  IP references and automate checks in your CI/CD pipeline.
match:
  conditions:
    - field: type
      operator: '=='
      value: dns
    - field: properties.dns_class
      operator: 'in'
      value: A,AAAA
      transformer: List
    - field: value
      operator: 'regex'
      value: ^((10\.\d{1,3}\.\d{1,3}\.\d{1,3}|127\.\d{1,3}\.\d{1,3}\.\d{1,3}|169\.254\.\d{1,3}\.\d{1,3}|172\.(1[6-9]|2\d|3[0-1])\.\d{1,3}\.\d{1,3}|192\.168\.\d{1,3}\.\d{1,3}|100\.(6[4-9]|[7-9]\d|1[0-1]\d|12[0-7])\.\d{1,3}\.\d{1,3}|0\.\d{1,3}\.\d{1,3}\.\d{1,3}|224\.\d{1,3}\.\d{1,3}\.\d{1,3}|240\.\d{1,3}\.\d{1,3}\.\d{1,3})|(::1|fc[0-9a-f]{2}:[0-9a-f:]+|fd[0-9a-f]{2}:[0-9a-f:]+|fe80:[0-9a-f:]+|::|ff[0-9a-f]{2}:[0-9a-f:]+))$
