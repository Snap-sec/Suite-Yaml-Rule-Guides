name: 'CNAME to External Domain'
description: >-
  Detects DNS CNAME records that alias to domains outside the organization's primary
  domain. External CNAME delegation transfers trust to a third party — if the target
  domain expires, is misconfigured, or is compromised, attackers can serve malicious
  content under the organization's domain. This is a common vector for subdomain
  takeover attacks and can undermine brand integrity and user trust.
product: asm
severity: info
isUniversal: false
remediation: >-
  Audit CNAME records pointing to external domains and verify that the target services
  are still active and owned by the organization. Remove dangling CNAMEs that reference
  decommissioned or unclaimed resources to prevent subdomain takeover. Maintain an
  inventory of third-party DNS delegations and review them periodically.
match:
  conditions:
    - field: type
      operator: '=='
      value: dns
    - field: properties.dns_class
      operator: '=='
      value: CNAME
    - field: value
      operator: 'regex'
      value: ^(?!site\.com$).+
