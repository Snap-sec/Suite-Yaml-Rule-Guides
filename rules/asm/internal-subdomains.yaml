name: 'Internal Subdomains'
description: >-
  Marking all Internal Subdomains as safe
product: asm
severity: info
isUniversal: false
match:
  conditions:
    - field: type
      operator: '=='
      value: subdomain
    - field: is_internal
      operator: '=='
      value: true
set:
  - field: exposure_status
    value: not_exposed
  - field: exposure_reason
    value: This subdomain resolves to an Internal IP
