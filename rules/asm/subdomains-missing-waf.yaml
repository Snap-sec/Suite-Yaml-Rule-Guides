name: 'Externally Exposed Subdomain Missing WAF'
description: >-
  Detects live, externally facing subdomains that lack Web Application Firewall (WAF)
  protection. Without a WAF, web applications are directly exposed to common attack
  vectors including SQL injection, cross-site scripting (XSS), request smuggling, and
  automated vulnerability scanning. WAF coverage gaps leave these subdomains as the
  path of least resistance for attackers targeting the organization's web perimeter.
product: asm
severity: info
isUniversal: true
remediation: >-
  Deploy a Web Application Firewall in front of all externally facing subdomains to
  filter malicious traffic before it reaches the application. Use managed WAF services
  from your CDN or cloud provider for rapid rollout. Configure rulesets to block OWASP
  Top 10 attack patterns and enable logging to monitor blocked requests continuously.
match:
  conditions:
    - field: type
      operator: '=='
      value: subdomain
    - field: properties.subdomain_status
      operator: '=='
      value: live
    - field: hasWaf
      operator: '=='
      value: false
    - field: network_scope
      operator: '=='
      value: external
