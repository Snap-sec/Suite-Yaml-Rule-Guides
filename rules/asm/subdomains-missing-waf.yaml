name: 'Externally Exposed Subdomain Missing WAF'
description: >-
  Detects live, externally facing subdomains that lack Web Application Firewall (WAF)
  protection. Without a WAF, web applications are directly exposed to common attack
  vectors including SQL injection, cross-site scripting (XSS), request smuggling, and
  automated vulnerability scanning. WAF coverage gaps leave these subdomains as the
  path of least resistance for attackers targeting the organization's web perimeter.
product: asm
severity: info
isUniversal: true
match:
  conditions:
    - field: type
      operator: '=='
      value: subdomain
    - field: properties.subdomain_status
      operator: '=='
      value: live
    - field: hasWaf
      operator: '=='
      value: false
    - field: network_scope
      operator: '=='
      value: external
set:
  - field: risk
    value: medium
  - field: exposure_reason
    value: The active subdomain is not protected by a Web Application Firewall (WAF).
