name: 'Subdomain Missing WAF'
description: >-
  Detects active subdomains that are not protected by WAF
product: asm
severity: info
isUniversal: true
match:
  conditions:
    - field: type
      operator: '=='
      value: subdomain
    - field: properties.subdomain_status
      operator: '=='
      value: live
    - field: hasWaf
      operator: '=='
      value: false
    - field: network_scope
      operator: '=='
      value: external
set:
  - field: risk
    value: medium
  - field: exposure_reason
    value: The active subdomain is not protected by a Web Application Firewall (WAF).
