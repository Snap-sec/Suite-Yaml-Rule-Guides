name: 'Web Server on Non-Standard HTTP Port'
description: >-
  Detects web servers responding on non-standard HTTP/HTTPS ports (other than 80 and 443).
  Web services on unexpected ports may bypass security controls, WAF rules, or indicate
  shadow IT and misconfigured deployments.
product: asm
severity: medium
isUniversal: true
remediation: >-
  Migrate web services to standard ports 80 and 443 so they fall under existing WAF,
  load balancer, and perimeter security controls. If non-standard ports are required,
  ensure they are covered by the same firewall rules, TLS configuration, and monitoring
  as standard ports. Investigate whether the service represents shadow IT or a misconfiguration.
match:
  conditions:
    - field: type
      operator: '=='
      value: port
    - field: properties.port_status
      operator: '=='
      value: open
    - field: properties.port_service
      operator: 'in'
      transformer: 'List'
      value: 'http,https'
    - field: properties.port_number
      operator: 'not_in'
      value: '80,443'
      transformer: List
    - field: externally_reachable
      operator: '=='
      value: true
