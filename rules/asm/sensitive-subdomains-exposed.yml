name: 'Sensitive Keyword in Subdomain'
description: >-
  Subdomain contains sensitive keywords.
product: asm
severity: medium
isUniversal: true
match:
  conditions:
    - field: type
      operator: '=='
      value: subdomain
    - field: properties.subdomain_status
      operator: '=='
      value: live
    - field: value
      operator: 'regex'
      value: (internal|private|backup|db|vpn)
    - field: externally_reachable
      operator: '=='
      value: true


set:
  - field: exposure_reason
    value: Sensitive keyword in subdomain
  - field: risk
    value: medium