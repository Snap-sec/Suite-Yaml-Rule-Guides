name: 'Sensitive Keyword in Subdomain'
description: >-
  Detects live, externally reachable subdomains whose names contain sensitive keywords
  indicating internal infrastructure, administrative panels, CI/CD tooling, databases,
  or non-production environments (e.g., admin, vpn, jenkins, staging, redis). These
  naming patterns significantly aid attacker reconnaissance by revealing the technology
  stack, internal architecture, and potential high-value targets without any active
  scanning required.
product: asm
severity: low
isUniversal: true
remediation: >-
  Restrict public access to subdomains containing sensitive keywords by placing them
  behind a VPN, IP allowlist, or zero-trust access proxy. Where possible, rename
  subdomains to avoid revealing internal tooling or infrastructure details. Enforce
  authentication on all administrative and internal-facing endpoints exposed to the internet.
match:
  conditions:
    - field: type
      operator: '=='
      value: subdomain
    - field: properties.subdomain_status
      operator: '=='
      value: live
    - field: value
      operator: 'regex'
      value: (internal|private|backup|db|vpn|admin|portal|dashboard|manage|management|manager|control|panel|cpanel|webmail|mail|smtp|ftp|sftp|ssh|rdp|remote|bastion|jump|gateway|proxy|firewall|waf|auth|login|sso|ldap|ad|corp|intranet|infra|infrastructure|devops|ci|jenkins|gitlab|github|sonar|jira|confluence|grafana|kibana|elastic|splunk|zabbix|nagios|monitor|logging|log|api|rest|graphql|swagger|debug|test|staging|dev|uat|qa|preprod|sandbox|demo|beta|legacy|old|temp|bak|archive|data|hadoop|kafka|redis|mongo|mysql|postgres|oracle|mssql|database|queue|rabbitmq|vault|secrets|pki|cert)
    - field: externally_reachable
      operator: '=='
      value: true