name: 'Asset Outside Expected Geo Location'
description: >-
  Detects IP assets hosted in geographic regions outside the organization's approved
  or expected country list. Assets in unexpected locations may indicate unauthorized
  infrastructure, shadow IT, compromised resources being re-routed, or violations of
  data residency and sovereignty regulations. Identifying these assets helps enforce
  compliance with geographic policies and reduces exposure from unmonitored regions.
product: asm
severity: high
isUniversal: false
remediation: >-
  Verify whether the asset's geographic location is intentional. If unauthorized,
  migrate the workload to an approved region or decommission the resource. Update
  infrastructure-as-code templates to enforce region constraints and implement cloud
  provider policies that prevent future deployments outside sanctioned geographies.
match:
  conditions:
    - field: type
      operator: '=='
      value: ip
    - field: properties.ip_country
      operator: 'not_in'
      value: SA
      transformer: List
    - field: network_scope
      operator: '=='
      value: external
