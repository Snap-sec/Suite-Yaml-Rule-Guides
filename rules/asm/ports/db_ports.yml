name: 'Publicly Exposed Database Port'
description: >-
  Detects open database service ports (MySQL 3306, PostgreSQL 5432, Redis 6379,
  MongoDB 27017) that are publicly accessible over the internet. Exposed database
  ports are high-value targets for attackers, enabling brute-force authentication
  attacks, data exfiltration, and remote code execution via known vulnerabilities.
  Database services should never be directly reachable from the public internet and
  must be shielded behind firewalls, VPNs, or private network segments.
product: asm
severity: high
isUniversal: true
remediation: >-
  Immediately restrict database ports from public access using firewall rules or
  security groups. Place database services behind a VPN or private subnet with no
  direct internet exposure. Enable strong authentication, enforce encrypted connections,
  and audit access logs regularly to detect unauthorized connection attempts.
match:
  conditions:
    - field: type
      operator: '=='
      value: port
    - field: value
      operator: 'in'
      value: 3306,5432,6379,27017
      transformer: List
    - field: properties.port_status
      operator: '=='
      value: open
    - field: properties.port_service_version
      operator: '!='
      value: cloudflare
