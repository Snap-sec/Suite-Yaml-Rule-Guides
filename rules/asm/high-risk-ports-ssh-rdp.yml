name: 'Publicly Exposed SSH/RDP Port'
description: >-
  Detects publicly accessible SSH (port 22) and RDP (port 3389) remote access services.
  These ports are among the most heavily targeted by automated scanners, botnets, and
  credential-stuffing campaigns. Exposed remote access services provide a direct path
  for attackers to gain interactive shell or desktop access, making them a critical
  entry point for ransomware deployment, lateral movement, and full environment compromise.
product: asm
severity: info
isUniversal: true
remediation: >-
  Block public access to SSH and RDP ports using firewall rules or security groups.
  Require connections through a VPN, bastion host, or zero-trust network access solution.
  Enforce key-based authentication for SSH, enable network-level authentication for RDP,
  and apply multi-factor authentication to all remote access sessions.
match:
  conditions:
    - field: type
      operator: '=='
      value: port
    - field: value
      operator: 'in'
      value: 22,3389
      transformer: List
