name: 'Publicly Exposed SSH/RDP Port'
description: >-
  Detects publicly accessible database services.
product: asm
severity: info
isUniversal: true
match:
  conditions:
    - field: type
      operator: '=='
      value: port
    - field: value
      operator: 'in'
      value: 22,3389
      transformer: List
set:
  - field: exposure_reason
    value: Publicly exposed database service detected
  - field: risk
    value: critical
