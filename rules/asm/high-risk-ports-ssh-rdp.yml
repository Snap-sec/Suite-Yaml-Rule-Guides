name: 'High-Risk Service Port Exposed (SSH/RDP)'
description: >-
  Detects publicly exposed SSH (port 22) or RDP (port 3389) services on internet-facing assets.
  These protocols are frequent targets for brute-force attacks and exploitation.
product: asm
severity: critical
isUniversal: true
match:
  and:
    - conditions:
        - field: type
          operator: '=='
          value: ip
        - field: externally_reachable
          operator: '=='
          value: true
    - conditions:
        - field: properties.open_ports
          operator: 'contains_any'
          value: [22, 3389]
set:
  - field: exposure_reason
    value: High-risk admin service (SSH/RDP) is exposed on a public-facing IP
  - field: risk
    value: critical
