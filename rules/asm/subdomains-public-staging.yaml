name: 'Publicly Exposed Staging/Development Subdomain'
description: >-
  Detects live, externally reachable subdomains matching staging, development, or test
  naming patterns (stg, dev, test). Non-production environments frequently run with
  debug modes enabled, weaker authentication, verbose error output, and unpatched
  dependencies. Public exposure of these environments gives attackers access to
  pre-release code, test data that may mirror production, and a lower-security entry
  point into the organization's infrastructure.
product: asm
severity: high
isUniversal: true
remediation: >-
  Restrict staging, development, and test subdomains from public internet access using
  VPN, IP allowlists, or authentication gateways. Disable debug modes, verbose error
  pages, and default credentials on all non-production environments. If public access
  is unavoidable, apply the same security hardening standards used in production.
match:
  conditions:
    - field: type
      operator: '=='
      value: subdomain
    - field: properties.subdomain_status
      operator: '=='
      value: live
    - field: value
      operator: 'regex'
      value: (stg|dev|test)
    - field: externally_reachable
      operator: '=='
      value: true
