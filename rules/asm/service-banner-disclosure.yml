name: 'Service with Banner Disclosure'
description: >-
  Detects open ports broadcasting a service banner that exposes software name, version,
  or platform details. Banner disclosure assists attackers in fingerprinting services
  and targeting known CVEs.
product: asm
severity: low
isUniversal: true
remediation: >-
  Configure each exposed service to suppress or customize its banner so that software
  name, version, and platform details are not disclosed. For web servers, set
  server-header directives to minimal values. Use reverse proxies to normalize responses
  and strip identifying headers before they reach external clients.
match:
  conditions:
    - field: type
      operator: '=='
      value: port
    - field: properties.port_status
      operator: '=='
      value: open
    - field: properties.port_banner
      operator: '!='
      value: null
    - field: externally_reachable
      operator: '=='
      value: true
