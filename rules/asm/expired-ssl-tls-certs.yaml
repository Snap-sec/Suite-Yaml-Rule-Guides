name: 'Expired Certificates'
description: >-
  Marking Expired Certificates as Unsafe
product: asm
severity: info
isUniversal: false
match:
  conditions:
    - field: type
      operator: '=='
      value: certificate
    - field: properties.certificate_is_expired
      operator: '=='
      value: true
set:
  - field: risk
    value: medium
  - field: exposure_reason
    value: SSL Certificate is Expired
