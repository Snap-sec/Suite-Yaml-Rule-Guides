name: 'Expired Certificates'
description: >-
  Detects SSL/TLS certificates within the asset inventory that have passed their
  expiration date. Expired certificates break the chain of trust, cause browser
  security warnings that erode user confidence, and may leave encrypted channels
  vulnerable to man-in-the-middle attacks. They can also indicate abandoned or
  unmaintained services that remain exposed without active security oversight.
product: asm
severity: info
isUniversal: false
remediation: >-
  Renew or replace the expired certificate immediately using a trusted certificate
  authority. Implement automated certificate lifecycle management with tools like
  Let's Encrypt or ACME-based solutions to prevent future expirations. Set up
  monitoring alerts well before expiry dates and decommission any abandoned services
  still presenting stale certificates.
match:
  conditions:
    - field: type
      operator: '=='
      value: certificate
    - field: properties.certificate_is_expired
      operator: '=='
      value: true
