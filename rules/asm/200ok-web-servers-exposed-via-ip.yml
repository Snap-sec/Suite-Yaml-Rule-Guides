name: 'Live Web Server Responding on Public IP Address'
description: >-
  Detects externally reachable web servers that return an HTTP 200 OK response and
  are accessed directly via a public IP address rather than a domain name. These
  live, actively-serving endpoints lack CDN and WAF coverage, are indexed by automated
  IP-range scanners, and expose the true origin server — making them easy targets for
  exploitation, DDoS attacks, and credential brute-forcing.
product: asm
severity: critical
isUniversal: true
remediation: >-
  Route the web server through a domain name fronted by a CDN and WAF to eliminate
  direct IP exposure. Restrict inbound HTTP/HTTPS traffic at the firewall to only
  CDN or load balancer IP ranges. Investigate why the service returns 200 OK without
  a domain and whether it represents an undocumented or forgotten internet-facing asset.
match:
  conditions:
    - field: type
      operator: '=='
      value: web_server
    - field: network_scope
      operator: '=='
      value: external
    - field: properties.subdomain_status_code
      operator: '=='
      value: 200
    - field: value
      operator: 'regex'
      value: ^(?!10\.)(?!127\.)(?!169\.254\.)(?!172\.(1[6-9]|2[0-9]|3[0-1])\.)(?!192\.168\.)\d{1,3}(\.\d{1,3}){3}$
