name: 'Subdomain Pointing to External Service'
description: >-
  Detects live subdomains whose DNS CNAME records resolve to external third-party services
  (e.g., AWS, GitHub Pages, Heroku). If the external service is unclaimed this may be
  vulnerable to subdomain takeover.
product: asm
severity: high
isUniversal: true
remediation: >-
  Verify that the external service referenced by the CNAME is still actively claimed
  and controlled by the organization. Remove DNS records pointing to deprovisioned or
  unclaimed third-party resources to eliminate subdomain takeover risk. Maintain a
  registry of external service dependencies and audit CNAME records on a regular schedule.
match:
  conditions:
    - field: type
      operator: '=='
      value: subdomain
    - field: properties.subdomain_status
      operator: '=='
      value: live
    - field: properties.cname_external
      operator: '=='
      value: true
