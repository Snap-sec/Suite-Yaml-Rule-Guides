name: 'Ports Proxies Through Cloudflare'
description: >-
  Marking Port proxied through cloud-flare as safe 
product: asm
severity: info
isUniversal: false
match:
  conditions:
    - field: type
      operator: '=='
      value: port
    - field: properties.port_service_version
      operator: 'regex'
      value: cloudflare
set:
  - field: exposure_status
    value: safe
  - field: exposure_reason
    value: This port is proxied through Cloud-flare; Hence safe.
