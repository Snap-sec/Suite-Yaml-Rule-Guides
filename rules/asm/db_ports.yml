name: 'Publicly Exposed Database Port'
description: >-
  Detects publicly accessible database services.
product: asm
severity: info
isUniversal: true
match:
  conditions:
    - field: type
      operator: '=='
      value: port
    - field: value
      operator: 'in'
      value: 3306,5432,6379,27017
      transformer: List
    - field: properties.port_status
      operator: '=='
      value: open
    - field: properties.port_service_version
      operator: '!='
      value: cloudflare
set:
  - field: exposure_reason
    value: Publicly exposed database service detected
  - field: risk
    value: critical
