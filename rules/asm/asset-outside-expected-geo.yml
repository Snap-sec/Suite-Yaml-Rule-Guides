name: 'Asset Outside Expected Geo Location'
description: >-
  Detects IP assets whose hosting country does not match the organization's expected geographic region. Assets hosted in unexpected countries may indicate rogue infrastructure, misconfiguration, or compromise.
product: asm
severity: info
isUniversal: false
match:
  conditions:
    - field: type
      operator: '=='
      value: ip
    - field: properties.ip_country
      operator: 'in'
      value: SA
      transformer: List
set:
  - field: exposure_reason
    value: Asset is hosted in an unexpected geographic region outside the organization's approved countries
  - field: risk
    value: medium
