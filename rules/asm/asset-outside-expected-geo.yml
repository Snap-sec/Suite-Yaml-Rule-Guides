name: 'Asset Outside Expected Geo Location'
description: >-
  Detects IP assets hosted in geographic regions outside the organization's approved
  or expected country list. Assets in unexpected locations may indicate unauthorized
  infrastructure, shadow IT, compromised resources being re-routed, or violations of
  data residency and sovereignty regulations. Identifying these assets helps enforce
  compliance with geographic policies and reduces exposure from unmonitored regions.
product: asm
severity: info
isUniversal: false
match:
  conditions:
    - field: type
      operator: '=='
      value: ip
    - field: properties.ip_country
      operator: 'not_in'
      value: SA
      transformer: List
    - field: network_scope
      operator: '=='
      value: external
set:
  - field: exposure_reason
    value: Asset is hosted in an unexpected geographic region outside the organization's approved countries
  - field: risk
    value: medium
