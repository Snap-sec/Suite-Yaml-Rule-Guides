name: 'Asset Outside Expected Geo Location'
description: >-
  aaa
product: asm
severity: info
isUniversal: false
match:
  conditions:
    - field: type
      operator: '=='
      value: ip
    - field: properties.ip_country
      operator: 'not_in'
      value: SA
      transformer: List
    - field: network_scope
      operator: '=='
      value: external
set:
  - field: exposure_reason
    value: Asset is hosted in an unexpected geographic region outside the organization's approved countries
  - field: risk
    value: medium
